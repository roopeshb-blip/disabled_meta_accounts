name: Check Meta Ad Account Statuses

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: # Manual trigger from GitHub UI or API

jobs:
  check-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Generous timeout for Meta API rate limits

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run account status check
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_SYSTEM_USER_ID: ${{ secrets.META_SYSTEM_USER_ID }}
          META_BM_ID: ${{ secrets.META_BM_ID }}
          META_API_VERSION: v22.0
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: npx tsx -r tsconfig-paths/register scripts/check-accounts.ts
